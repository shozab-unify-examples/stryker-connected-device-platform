name: Infrastructure-as-Code Governance Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  iac-scan:
    name: IaC Governance — Checkov Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov IaC scan
        id: checkov
        run: |
          pip install checkov --quiet
          checkov -d infrastructure/ --output sarif --output-file-path checkov-results.sarif || true

      - name: Check for critical IaC violations
        id: iac-check
        run: |
          echo "Scanning for exposed management endpoints..."
          if grep -r "0.0.0.0/0" infrastructure/ --include="*.tf" -l; then
            echo "violation_found=true" >> $GITHUB_OUTPUT
          else
            echo "violation_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate SARIF finding
        if: steps.iac-check.outputs.violation_found == 'true'
        run: |
          cat > iac-governance-findings.sarif << 'EOF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "CCI Governance / Checkov",
                    "version": "1.0.0",
                    "rules": [
                      {
                        "id": "CCI-IAC-001",
                        "name": "ExposedManagementEndpoint",
                        "shortDescription": { "text": "Publicly Exposed Linux Management Endpoint" },
                        "fullDescription": { "text": "IaC configuration exposes administrative access outside approved network boundaries." },
                        "help": { "text": "Restrict SSH and management port ingress to approved VPN CIDR blocks. Remove 0.0.0.0/0 from security group rules." },
                        "properties": {
                          "tags": ["infrastructure", "network-security", "iac"],
                          "severity": "critical",
                          "owner": "Infrastructure Security",
                          "policy": "Infrastructure-as-Code Governance Required",
                          "remediationEffortHours": 40,
                          "estimatedNonComplianceCost": 450000
                        }
                      }
                    ]
                  }
                },
                "results": [
                  {
                    "ruleId": "CCI-IAC-001",
                    "level": "error",
                    "message": { "text": "Publicly exposed Linux management endpoint detected. Security group allows SSH (port 22) ingress from 0.0.0.0/0, exposing administrative access outside approved network boundaries. Estimated non-compliance cost: $450,000. Remediation effort: 40 hours." },
                    "locations": [
                      {
                        "physicalLocation": {
                          "artifactLocation": { "uri": "infrastructure/security-groups.tf", "uriBaseId": "%SRCROOT%" },
                          "region": { "startLine": 18 }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Upload SARIF
        if: steps.iac-check.outputs.violation_found == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: iac-governance-findings.sarif
          category: cci-iac-governance

      - name: Fail pipeline — IaC governance gate
        if: steps.iac-check.outputs.violation_found == 'true'
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║          CCI GOVERNANCE GATE FAILURE                        ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Policy:      IaC Governance Required                       ║"
          echo "║  Severity:    CRITICAL                                       ║"
          echo "║  Finding:     Publicly exposed Linux management endpoint     ║"
          echo "║  Resource:    infrastructure/security-groups.tf:18           ║"
          echo "║  Owner:       Infrastructure Security                        ║"
          echo "║  Effort:      40 hours                                      ║"
          echo "║  Cost Risk:   \$450,000                                      ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          exit 1
