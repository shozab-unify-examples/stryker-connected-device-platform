apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Connected Device Platform CI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Mock Secrets Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] Secrets scan complete — 3 findings (CRITICAL: RSA private key, AWS keys)"
      - name: Mock IaC Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] IaC scan complete — 1 CRITICAL finding (SSH port 22 open to 0.0.0.0/0)"
      - name: Mock SAST Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] SAST scan complete — 2 findings (HIGH)"
      - name: Publish Security Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Security Scan Results — Connected Device Platform
            | Scanner | Findings | Severity |
            |---------|----------|----------|
            | Secrets | 3 | CRITICAL |
            | IaC | 1 | CRITICAL |
            | SAST | 2 | HIGH |

            **Critical Finding**: RSA private key committed in src/device_manager.py
            **IaC Finding**: security-groups.tf:18 — SSH port 22 open to 0.0.0.0/0 (CCI-IAC-001)
            **SLA Status**: OVERDUE — 4 findings breached 7-day critical SLA
          format: MARKDOWN

  build:
    needs:
      - scan
    outputs:
      artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Build
        uses: docker://alpine:3.19
        run: |
          echo "Building connected-device-platform v2.1.${{ cloudbees.run_number }}"
      - name: Register build artifact
        id: register-artifact
        uses: cloudbees-io/register-build-artifact@v2
        with:
          name: connected-device-platform
          version: 2.1.${{ cloudbees.run_number }}
          url: https://github.com/shozab-unify-examples/stryker-connected-device-platform
      - name: Publish Build Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Build — Connected Device Platform v2.1.${{ cloudbees.run_number }}
            - **Classification**: CRITICAL | connected-device | regulated | infrastructure-as-code
            - **Owner**: Connected Devices BU
          format: MARKDOWN

  deploy-dev:
    needs:
      - build
    steps:
      - name: Deploy to Dev
        uses: docker://alpine:3.19
        run: |
          echo "Deployed connected-device-platform v2.1.${{ cloudbees.run_number }} to DEV"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: connected-device-platform
          version: 2.1.${{ cloudbees.run_number }}
          environment-name: stryker-dev
          url: https://github.com/shozab-unify-examples/stryker-connected-device-platform

  deploy-staging:
    needs:
      - build
      - deploy-dev
    steps:
      - name: Deploy to Staging
        uses: docker://alpine:3.19
        run: |
          echo "Deployed connected-device-platform v2.1.${{ cloudbees.run_number }} to STAGING"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: connected-device-platform
          version: 2.1.${{ cloudbees.run_number }}
          environment-name: stryker-staging
          url: https://github.com/shozab-unify-examples/stryker-connected-device-platform

  deploy-prod:
    needs:
      - build
      - deploy-staging
    steps:
      - name: Deploy to Production
        uses: docker://alpine:3.19
        run: |
          echo "Deployed connected-device-platform v2.1.${{ cloudbees.run_number }} to PRODUCTION"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: connected-device-platform
          version: 2.1.${{ cloudbees.run_number }}
          environment-name: stryker-prod
          url: https://github.com/shozab-unify-examples/stryker-connected-device-platform
